# TemperatureController Settings Review
# Status: pending
#
# Implementations:
#   Lakeshore218, VirtualTemperatureController, PythonTemperatureController
#
# Priority: Required | Important | Optional
#
# NOTES:
#   1. PythonTemperatureController has a configParam: numChannels (uint, 1-16, default 4).
#      This is a pre-construction parameter and must become Required.
#
#   2. Lakeshore218 constructor has NO setDefault calls (only comm settings,
#      which are excluded). The base class sets interval=500 in its constructor.
#
#   3. VirtualTemperatureController constructor has NO setDefault calls beyond
#      what the base class provides.
#
#   4. TemperatureController base class sets interval=500 in its constructor.
#      This is shared across all implementations. It can stay in the base class
#      setDefault, but could also be registered for visibility in AddProfileDialog.
#      DECISION: register interval as Optional, or leave as base-class setDefault?
#
#   5. The channels array (channel names and enabled state) is runtime data
#      managed by the base class. NOT a registration candidate.
# ==============================================================================

# ── Optional: interval (currently set in base class only) ─────────────────────

[partial.interval]
label            = "Read Interval (ms)"
tooltip          = "Polling interval for temperature readings in milliseconds"
priority         = "Optional"
default_if_added = 500
missing_from     = []   # not registered in any implementation currently
# Set in TemperatureController base constructor. Register in all impls, or leave in base?
decision         = ""

# ── PythonTemperatureController-Only (from configParams -- must become Required) ─

[impl_only.PythonTemperatureController.numChannels]
label    = "Temperature Channels"
tooltip  = "Number of temperature sensor input channels"
default  = 4
min      = 1
max      = 16
priority = "Required"

# ── Reference: Default Values per Implementation ───────────────────────────────
#
# Key          | Lakeshore218 |   Virtual |     Python
# -------------|--------------|-----------|------------
# interval     |     500 (base)|  500 (base)| 500 (base)
# numChannels  |           -- |        -- |   4 (req)
#
# Lakeshore218 has 8 channels (fixed in hardware; not a registrable setting).
# Channel count is passed as constructor argument to TemperatureController(n,...).
