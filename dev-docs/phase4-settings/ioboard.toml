# IOBoard Settings Review
# Status: pending
#
# Implementations:
#   VirtualIOBoard, LabJackU3, PythonIOBoard
#
# Priority: Required | Important | Optional
# Decision (partial): add_to_missing | existing_only | setdefault_only | remove
#
# NOTES:
#   1. PythonIOBoard has configParams: numAnalogChannels and numDigitalChannels.
#      These are pre-construction parameters and must become Required.
#      PythonIOBoard ONLY sets these two -- all other DigitizerConfig keys are
#      absent. DECISION NEEDED: should the other settings (fullScale, offset,
#      trigger, record length, etc.) be added to PythonIOBoard? Or is it
#      intentional that Python IOBoards don't expose those?
#
#   2. IOBoard base class sets isTriggered=false in its constructor. This is
#      shared across all implementations. Consider leaving it in the base class.
#
#   3. VirtualIOBoard and LabJackU3 have identical settings (same values).
#      The LabJackU3 additionally has a Custom comm array for the device path;
#      this is communication config and is excluded from registration.
#
#   4. IOBoard uses the same key namespace as FtmwScope (BC::Key::Digi), but
#      omits bandwidth and many capability flags (canBlockAverage=false,
#      canMultiRecord=false, multiBlock=false, maxRecordLength=1 are fixed
#      hardware limitations of an IO board, not user-configurable).
#      These may be better left as setDefault in constructor (power-user only).
# ==============================================================================

# ── Common Scalar Settings (VirtualIOBoard and LabJackU3) ──────────────────────

[settings.numAnalogChannels]
label    = "Analog Channels"
tooltip  = "Number of analog input channels"
min      = 0
max      = 128
priority = "Required"

[settings.numDigitalChannels]
label    = "Digital Channels"
tooltip  = "Number of digital input channels"
min      = 0
max      = 128
priority = "Required"

[settings.hasAuxTriggerChannel]
label    = "Aux Trigger Channel"
tooltip  = "Has auxiliary trigger input"
priority = "Optional"

[settings.minFullScale]
label    = "Min Full Scale (V)"
tooltip  = "Minimum full-scale voltage range"
priority = "Optional"

[settings.maxFullScale]
label    = "Max Full Scale (V)"
tooltip  = "Maximum full-scale voltage range"
priority = "Optional"

[settings.minVOffset]
label    = "Min V Offset (V)"
tooltip  = "Minimum vertical offset"
priority = "Optional"

[settings.maxVOffset]
label    = "Max V Offset (V)"
tooltip  = "Maximum vertical offset"
priority = "Optional"

[settings.isTriggered]
label    = "Externally Triggered"
tooltip  = "Device uses external trigger (typically false for IO boards)"
priority = "Optional"

[settings.minTrigDelay]
label    = "Min Trig Delay (us)"
tooltip  = "Minimum trigger delay in microseconds"
priority = "Optional"

[settings.maxTrigDelay]
label    = "Max Trig Delay (us)"
tooltip  = "Maximum trigger delay in microseconds"
priority = "Optional"

[settings.minTrigLevel]
label    = "Min Trig Level (V)"
tooltip  = "Minimum trigger threshold voltage"
priority = "Optional"

[settings.maxTrigLevel]
label    = "Max Trig Level (V)"
tooltip  = "Maximum trigger threshold voltage"
priority = "Optional"

[settings.maxRecordLength]
label    = "Max Record Length"
tooltip  = "Maximum record length in samples (typically 1 for IO boards)"
min      = 1
priority = "Optional"

[settings.canBlockAverage]
label    = "Block Average"
tooltip  = "Supports block averaging (typically false for IO boards)"
priority = "Optional"

[settings.canMultiRecord]
label    = "Multi Record"
tooltip  = "Supports multi-record acquisition (typically false for IO boards)"
priority = "Optional"

[settings.multiBlock]
label    = "Multi Block"
tooltip  = "Can simultaneously block average and multi-record"
priority = "Optional"

[settings.maxBytes]
label    = "Max Bytes/Point"
tooltip  = "Maximum bytes per sample"
min      = 1
max      = 8
priority = "Optional"

# ── Partial Settings ───────────────────────────────────────────────────────────
# PythonIOBoard only sets numAnalogChannels and numDigitalChannels (from configParams).
# All other settings are absent. Decision needed for each:

[partial.hasAuxTriggerChannel_python]
label            = "hasAuxTriggerChannel for PythonIOBoard"
tooltip          = "(see settings.hasAuxTriggerChannel)"
priority         = "Optional"
default_if_added = false
missing_from     = ["PythonIOBoard"]
decision         = "Add this and all other missing entries to PythonIOBoard. Default minFullScale 0.1 and maxFullScale 10; others can follow LabJackU3."

# (Add similar entries for minFullScale, maxFullScale, etc. if desired.
#  Most likely these should all be "existing_only" or "setdefault_only" for
#  PythonIOBoard since the Python script defines the hardware capabilities.)

# ── Sample Rates Array ─────────────────────────────────────────────────────────

[arrays.sampleRates]
label    = "Sample Rates"
tooltip  = "Available sample rates (for IO boards typically 'N/A')"
priority = "Optional"

# ── Reference: Default Values per Implementation ───────────────────────────────
#
# Key                   |   Virtual |  LabJackU3 |     Python
# ----------------------|-----------|------------|------------
# numAnalogChannels     |         8 |          8 |   0 (req)*
# numDigitalChannels    |         8 |          8 |   0 (req)*
# hasAuxTriggerChannel  |     false |      false |          ─
# minFullScale          |      2.44 |       2.44 |          ─
# maxFullScale          |      2.44 |       2.44 |          ─
# minVOffset            |       0.0 |        0.0 |          ─
# maxVOffset            |       0.0 |        0.0 |          ─
# isTriggered           |     false |      false |          ─
# minTrigDelay          |       0.0 |        0.0 |          ─
# maxTrigDelay          |       0.0 |        0.0 |          ─
# minTrigLevel          |       0.0 |        0.0 |          ─
# maxTrigLevel          |       0.0 |        0.0 |          ─
# maxRecordLength       |         1 |          1 |          ─
# canBlockAverage       |     false |      false |          ─
# canMultiRecord        |     false |      false |          ─
# multiBlock            |     false |      false |          ─
# maxBytes              |         2 |          2 |          ─
#
# sampleRates: VirtualIOBoard = [{"N/A", 0.0}]; LabJackU3 = [{"50 kSa/s", 50e3}]
# * PythonIOBoard defaults 0 so user must set correct counts
