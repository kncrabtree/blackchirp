# PressureController Settings Review
# Status: pending
#
# Implementations:
#   VirtualPressureController, IntelliSysIQPlus, PythonPressureController
#
# Priority: Required | Important | Optional
# Decision (partial): add_to_missing | existing_only | setdefault_only | remove
#
# NOTES:
#   1. PythonPressureController has a configParam: readOnly (bool, default false).
#      This is a pre-construction parameter (determines whether a valve is
#      controlled). It must become Required.
#   2. VirtualPressureController min = -1.0 vs IntelliSysIQPlus min = 0.0.
#      The virtual device allows reading negative pressures (gauge sense);
#      IntelliSys is absolute. This difference is intentional.
# ==============================================================================

# ── Common Scalar Settings ─────────────────────────────────────────────────────

[settings.min]
label    = "Min Pressure"
tooltip  = "Minimum pressure reading (display range lower bound)"
priority = "Optional"

[settings.max]
label    = "Max Pressure"
tooltip  = "Maximum pressure reading (display range upper bound)"
min      = 0.0
priority = "Optional"

[settings.decimals]
label    = "Display Decimals"
tooltip  = "Number of decimal places in pressure display"
min      = 0
max      = 8
priority = "Optional"

[settings.units]
label    = "Pressure Units"
tooltip  = "Pressure units for display"
priority = "Optional"

[settings.readInterval]
label    = "Read Interval (ms)"
tooltip  = "Polling interval for pressure readings in milliseconds"
min      = 1
priority = "Optional"

[settings.hasValve]
label    = "Has Valve"
tooltip  = "Device includes a controlled valve output"
priority = "Optional"

# ── PythonPressureController-Only (from configParams -- must become Required) ───

[impl_only.PythonPressureController.readOnly]
label    = "Read Only"
tooltip  = "Device is a read-only pressure gauge (no valve control)"
default  = false
priority = "Required"

# ── Reference: Default Values per Implementation ───────────────────────────────
#
# Key             |   Virtual | IntelliSys |     Python
# ----------------|-----------|------------|------------
# min             |      -1.0 |        0.0*|       -1.0
# max             |      20.0 |       20.0 |       20.0
# decimals        |         4 |          4 |          4
# units           |    "Torr" |     "Torr" |     "Torr"
# readInterval    |       200 |        200 |        200
# hasValve        |      true |       true |       true
# readOnly        |        -- |         -- |  false (req)
#
# * IntelliSys min=0.0 (absolute pressure sensor, cannot read below vacuum)
