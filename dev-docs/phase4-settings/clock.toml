# Clock Settings Review
# Status: pending
#
# Implementations:
#   Valon5015, Valon5009, HP83712B, FixedClock, PythonClock
#
# Priority: Required | Important | Optional
# Decision (partial): add_to_missing | existing_only | setdefault_only | remove
#
# NOTES:
#   1. PythonClock has configParams: numOutputs (int, 1-8) and tunable (bool).
#      These are pre-construction parameters and must become Required.
#   2. PythonClock also setDefault's minFreq=0.0 and maxFreq=1e7 -- these should
#      be registered as Important (user must set them for Python hardware).
#   3. FixedClock has a `ch` array that stores per-channel frequencies; this is
#      user-editable runtime data (not hardware specification), and should remain
#      as setArray in the constructor. It is NOT a registration candidate.
#   4. Clock::Clock() base constructor does not set any registered keys.
#      numOutputs and tunable are read before construction in PythonClock only.
# ==============================================================================

# ── Common Scalar Settings ─────────────────────────────────────────────────────

[settings.minFreq]
label    = "Min Frequency (MHz)"
tooltip  = "Minimum output frequency in MHz"
min      = 0.0
priority = "Important"

[settings.maxFreq]
label    = "Max Frequency (MHz)"
tooltip  = "Maximum output frequency in MHz"
min      = 0.0
priority = "Important"

[settings.lock]
label    = "Requires External Lock"
tooltip  = "Clock references an external 10 MHz lock signal"
priority = "Optional"

# ── PythonClock-Only Settings (from configParams -- must become Required) ───────

[impl_only.PythonClock.numOutputs]
label    = "Number of Outputs"
tooltip  = "Number of independent frequency outputs on this clock"
default  = 1
min      = 1
max      = 8
priority = "Required"

[impl_only.PythonClock.tunable]
label    = "Tunable"
tooltip  = "Clock frequency can be changed at runtime"
default  = true
priority = "Required"

# ── Reference: Default Values per Implementation ───────────────────────────────
#
# Key           | Valon5015 | Valon5009 |  HP83712B | FixedClock | PythonClock
# --------------|-----------|-----------|-----------|------------|------------
# minFreq (MHz) |     500.0 |     500.0 |       1.0 |        0.0 |         0.0
# maxFreq (MHz) |   15000.0 |    6000.0 |   20000.0 |       1e+7 |        1e+7
# lock          |     false |      true |     false |       true |          --
# numOutputs    |        -- |        -- |        -- |         -- |     1 (req)
# tunable       |        -- |        -- |        -- |         -- |  true (req)
#
# Note: Valon5009 has 2 physical output channels (set in constructor numOutputs arg).
# Valon5015 has 1. HP83712B has 1. FixedClock has 6. These are hard-coded in the
# constructor call to Clock(n, ...) and are NOT settings -- do not register them.
