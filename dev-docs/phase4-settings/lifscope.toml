# minVOffset            |      -2.0 |         -2.0 |      -2.0 |       -2.0
# maxVOffset            |       2.0 |          2.0 |       2.0 |        2.0
# isTriggered           |      true |         true |      true |       true
# minTrigDelay          |     -10.0 |        -10.0 |     -10.0 |      -10.0
# maxTrigDelay          |      10.0 |         10.0 |      10.0 |       10.0
# minTrigLevel          |      -5.0 |         -5.0 |      -5.0 |       -5.0
# maxTrigLevel          |       5.0 |          5.0 |       5.0 |        5.0
