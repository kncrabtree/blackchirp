# RigolDS2302A     10, 20, 50, 100, 200, 500, 1000 MSa/s
# M4i2211x8        78.125, 156.25, 312.5, 625, 1250 MSa/s  [BUG: last entry says "GSa/s"]
# PythonLifScope   78.125, 156.25, 312.5, 625, 1250 MSa/s  [same typo as M4i2211x8]
