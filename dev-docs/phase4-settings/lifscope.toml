# canMultiRecord        |     false |        false |     false |      false
# multiBlock            |     false |        false |     false |          ─
# maxBytes              |         2 |            1*|         1*|          2
#
# Partial (─ = not set):
# maxRecordLength       |         ─ |      1400000*|         ─ |     1e+08*
# maxAverages           |         ─ |            1*|         ─ |       100*
# maxRecords            |         ─ |            1 |         ─ |           ─
# queryIntervalMs       |         ─ |          101 |         ─ |           ─
