# FtmwScope Settings Review
# Status: pending
#
# Implementations (✓ = already migrated in Phase 2):
#   VirtualFtmwScope ✓, Dpo71254b, Dsa71604c, DSOv204A, DSOx92004A, MSO64B, MSO72004C, M4i2220x8
#
# Priority: Required | Important | Optional
# Decision (partial): add_to_missing | existing_only | setdefault_only | remove
#
# NOTE: maxRecordLength, maxAverages, and maxRecords are missing from VirtualFtmwScope
# (already migrated -- needs retroactive update), MSO72004C, and M4i2220x8.
# Recommended action: add_to_missing, but defaults for M4i2220x8 need to be
# looked up from the Spectrum hardware manual.
# ==============================================================================

# ── Common Scalar Settings ─────────────────────────────────────────────────────

[settings.numAnalogChannels]
label    = "Analog Channels"
tooltip  = "Number of analog input channels"
min      = 1
max      = 32
priority = "Required"

[settings.numDigitalChannels]
label    = "Digital Channels"
tooltip  = "Number of digital input channels"
min      = 0
max      = 128
priority = "Required"

[settings.hasAuxTriggerChannel]
label    = "Aux Trigger Channel"
tooltip  = "Has auxiliary trigger input (separate from analog channels)"
priority = "Optional"

[settings.minFullScale]
label    = "Min Full Scale (V)"
tooltip  = "Minimum full-scale voltage range"
priority = "Optional"

[settings.maxFullScale]
label    = "Max Full Scale (V)"
tooltip  = "Maximum full-scale voltage range"
priority = "Optional"

[settings.minVOffset]
label    = "Min V Offset (V)"
tooltip  = "Minimum vertical offset"
priority = "Optional"

[settings.maxVOffset]
label    = "Max V Offset (V)"
tooltip  = "Maximum vertical offset"
priority = "Optional"

[settings.isTriggered]
label    = "Externally Triggered"
tooltip  = "Digitizer uses external trigger signal"
priority = "Optional"

[settings.minTrigDelay]
label    = "Min Trig Delay (us)"
tooltip  = "Minimum trigger delay in microseconds"
priority = "Optional"

[settings.maxTrigDelay]
label    = "Max Trig Delay (us)"
tooltip  = "Maximum trigger delay in microseconds"
priority = "Optional"

[settings.minTrigLevel]
label    = "Min Trig Level (V)"
tooltip  = "Minimum trigger threshold voltage"
priority = "Optional"

[settings.maxTrigLevel]
label    = "Max Trig Level (V)"
tooltip  = "Maximum trigger threshold voltage"
priority = "Optional"

[settings.canBlockAverage]
label    = "Block Average"
tooltip  = "Supports block averaging mode"
priority = "Optional"

[settings.canMultiRecord]
label    = "Multi Record"
tooltip  = "Supports multi-record acquisition"
priority = "Optional"

[settings.multiBlock]
label    = "Multi Block"
tooltip  = "Can simultaneously block average and multi-record"
priority = "Optional"

[settings.maxBytes]
label    = "Max Bytes/Point"
tooltip  = "Maximum bytes per sample (1 or 2)"
min      = 1
max      = 8
priority = "Optional"

[settings.bandwidth]
label    = "Bandwidth (MHz)"
tooltip  = "Analog bandwidth in MHz"
priority = "Important"

# ── Partial Settings (not in all implementations) ──────────────────────────────

[partial.maxRecordLength]
label            = "Max Record Length"
tooltip          = "Maximum record length in samples"
priority         = "Important"
default_if_added = 100000000
missing_from     = ["VirtualFtmwScope", "MSO72004C", "M4i2220x8"]
# M4i2220x8 default needs verification from Spectrum M4i.2220-x8 manual.
decision         = "add_to_missing"
notes            = "M4i2220x8 should be 2^30 (integer)"

[partial.maxAverages]
label            = "Max Averages"
tooltip          = "Maximum number of block averages"
priority         = "Optional"
default_if_added = 100
missing_from     = ["VirtualFtmwScope", "MSO72004C", "M4i2220x8"]
# M4i2220x8 default needs verification from Spectrum M4i.2220-x8 manual.
decision         = "add_to_missing"
notes            = "M4i2220x8 max Averages should be 2^20 (integer)"

[partial.maxRecords]
label            = "Max Records"
tooltip          = "Maximum number of multi-records"
priority         = "Optional"
default_if_added = 100
missing_from     = ["VirtualFtmwScope", "MSO72004C", "M4i2220x8"]
# M4i2220x8 default needs verification from Spectrum M4i.2220-x8 manual.
decision         = "add_to_missing"

# ── Implementation-Only Settings ───────────────────────────────────────────────

[impl_only.VirtualFtmwScope.interval]
label    = "Sim Interval (ms)"
tooltip  = "Simulated acquisition interval in milliseconds"
default  = 200
min      = 1
priority = "Optional"
# Already registered; update label/tooltip/priority here if desired.

# ── Sample Rates Array ─────────────────────────────────────────────────────────

[arrays.sampleRates]
label    = "Sample Rates"
tooltip  = "Available digitizer sample rates"
priority = "Important"

