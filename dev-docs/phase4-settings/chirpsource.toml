# ChirpSource (AWG) Settings Review
# Status: pending
#
# Implementations (✓ = already migrated in Phase 2):
#   VirtualAwg ✓, PythonAwg ✓, AWG70002a, AWG5204, AWG7122b, M8190, M8195a, AD9914
#
# Priority: Required | Important | Optional
# Decision (partial): add_to_missing | existing_only | setdefault_only | remove
#
# NOTES:
#   1. AD9914 is a Direct Digital Synthesizer (DDS), not an arbitrary waveform generator.
#      rampOnly=true is effectively fixed for this device. Consider making it Required
#      (and non-editable after creation) or leaving it as Optional with the default
#      locked to true. Also: prot=false and amp=false are fixed DDS limitations.
#   2. AD9914 max freq is stored as a computed constant (3.75e9 * 0.4 / 1e6 = 1500.0 MHz).
#   3. AD9914 constructor has no save() call -- may be inherited from base. No action needed
#      for migration, but worth verifying.
#   4. AWG70002a, AWG5204, AWG7122b use a runtime-populated `hashes` array (chirp waveform
#      cache). This is NOT a settings-registration candidate; leave as-is in the AWG code.
#   5. AWG7122b is the only impl with triggered=false by default.
# ==============================================================================

# ── Common Scalar Settings ─────────────────────────────────────────────────────

[settings.rate]
label    = "Sample Rate (Hz)"
tooltip  = "DAC output sample rate"
min      = 1e6
max      = 100e9
priority = "Important"

[settings.samples]
label    = "Max Samples"
tooltip  = "Maximum waveform sample count"
min      = 0.0
priority = "Optional"

[settings.min]
label    = "Min Freq (MHz)"
tooltip  = "Minimum chirp frequency in MHz"
min      = 0.0
priority = "Optional"

[settings.max]
label    = "Max Freq (MHz)"
tooltip  = "Maximum chirp frequency in MHz"
min      = 0.0
priority = "Optional"

[settings.prot]
label    = "Protection Pulse"
tooltip  = "AWG outputs a protection pulse channel"
priority = "Optional"

[settings.amp]
label    = "Amp Enable Pulse"
tooltip  = "AWG outputs an amplifier enable pulse channel"
priority = "Optional"

[settings.rampOnly]
label    = "Ramp Only"
tooltip  = "Restrict to linear frequency ramp chirps (no arbitrary waveforms)"
priority = "Optional"

[settings.triggered]
label    = "Triggered"
tooltip  = "AWG waits for an external trigger before outputting"
priority = "Optional"

# ── Reference: Default Values per Implementation ───────────────────────────────
#
# Key        |  Virtual |  Python  | AWG70002a |  AWG5204 | AWG7122b |    M8190 |   M8195a |   AD9914
# -----------|----------|----------|-----------|----------|----------|----------|----------|----------
# rate (Hz)  |    16e9  |    16e9  |    16e9   |    10e9  |    24e9  |  9.375e9 |    65e9  |   3.75e9
# samples    |    2e9   |    2e9   |    2e9    |    2e9   |    2e9   |    2e9   |    2e9   |     1e9
# min (MHz)  |    100.0 |    100.0 |    100.0  |    100.0 |     50.0 |      0.0 |      0.0 |      0.0
# max (MHz)  |   6250.0 |   6250.0 |    6250.0 |   2500.0 |  12000.0 |   5000.0 |  26500.0 |   1500.0*
# prot       |     true |     true |      true |     true |     true |     true |     true |    false*
# amp        |     true |     true |      true |     true |     true |     true |     true |    false*
# rampOnly   |    false |    false |     false |    false |    false |    false |    false |     true*
# triggered  |     true |     true |      true |     true |    false*|     true |     true |     true
#
# * = differs from majority / notable
# AD9914 max = 3.75e9 * 0.4 / 1e6 = 1500.0 MHz (40% of clock rate)
