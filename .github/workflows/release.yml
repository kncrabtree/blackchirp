name: Release Build

# Builds Blackchirp packages for Linux (DEB, RPM, AppImage), macOS (DMG, TGZ),
# and Windows (NSIS, ZIP). Triggered manually via workflow_dispatch (with
# per-platform toggles) or automatically when a GitHub Release is published.
#
# On release: published, each job attaches its artifacts to the release.
# On workflow_dispatch, artifacts are uploaded to the workflow run only.

on:
  workflow_dispatch:
    inputs:
      run_linux_deb:
        description: 'Build Linux .deb package'
        type: boolean
        default: true
      run_linux_rpm:
        description: 'Build Linux .rpm package'
        type: boolean
        default: true
      run_linux_appimage:
        description: 'Build Linux AppImage'
        type: boolean
        default: true
      run_macos:
        description: 'Build macOS .dmg / .tar.gz'
        type: boolean
        default: true
      run_windows:
        description: 'Build Windows NSIS installer / .zip'
        type: boolean
        default: true
  release:
    types: [published]

permissions:
  contents: write
  # Required by actions/attest-build-provenance: id-token mints the OIDC
  # token Sigstore signs the attestation with, attestations writes the
  # resulting bundle into the repo's attestation store.
  id-token: write
  attestations: write

env:
  QT_VERSION: '6.9.1'
  QWT_VERSION: '6.3.0'
  CMAKE_BUILD_TYPE: Release
  # Blackchirp version (matches BC_MAJOR/MINOR/PATCH in CMakeLists.txt). The
  # built executables are version-suffixed (e.g., blackchirp-2.0.0) and the
  # CPack output filename embeds it. Bump in sync with CMakeLists.txt.
  BC_VERSION: '2.0.0'

jobs:
  # ============================================================================
  # Linux .deb (Ubuntu)
  # ============================================================================
  linux-deb:
    name: Linux DEB
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.run_linux_deb
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            qt6-base-dev libqt6serialport6-dev libqt6svg6-dev \
            libgsl-dev libeigen3-dev \
            libudev-dev \
            file dpkg-dev fakeroot

      - name: Restore Qwt cache
        id: qwt-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          # Qt version no longer in the key: system Qt is pinned to the
          # runner's distro Qt, not install-qt-action's QT_VERSION.
          key: qwt-${{ env.QWT_VERSION }}-ubuntu-noble-sysqt-v1

      - name: Build Qwt from source
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl -L -o qwt.tar.bz2 \
            "https://sourceforge.net/projects/qwt/files/qwt/${QWT_VERSION}/qwt-${QWT_VERSION}.tar.bz2/download"
          tar xf qwt.tar.bz2
          cd "qwt-${QWT_VERSION}"
          sed -i "s|^[[:space:]]*QWT_INSTALL_PREFIX[[:space:]]*=.*|QWT_INSTALL_PREFIX = ${{ github.workspace }}/qwt-install|" qwtconfig.pri
          sed -i 's|^[[:space:]]*QWT_INSTALL_HEADERS[[:space:]]*=.*|QWT_INSTALL_HEADERS = $${QWT_INSTALL_PREFIX}/include/qwt6|' qwtconfig.pri
          sed -i -E "/^[[:space:]]*QWT_CONFIG[[:space:]]*\+=[[:space:]]+Qwt(Examples|Playground|Designer|Tests|Framework)[[:space:]]*$/d" qwtconfig.pri
          qmake6 qwt.pro
          make -j"$(nproc)"
          make install

      # Save the Qwt build immediately after it succeeds so a failure in
      # Configure / Build / Test / Package below does not waste the rebuild
      # on the next workflow_dispatch retry. actions/cache@v5 dropped the
      # save-always option; the unified action's post-step skips the save
      # whenever the job fails. The split restore/save pattern with this
      # step gated on cache-hit avoids that — Build Qwt's success implies
      # the install dir is good, and the job aborts before reaching here
      # if Build Qwt failed.
      - name: Save Qwt cache
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          key: qwt-${{ env.QWT_VERSION }}-ubuntu-noble-sysqt-v1

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBC_BUNDLE_QWT=ON \
            -DQWT_ROOT="${{ github.workspace }}/qwt-install" \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/qwt-install"

      - name: Build
        # `-- -k 0` passes through to ninja's keep-going flag (0 = unlimited)
        # so a single compilation failure doesn't mask other failures further
        # down the source tree. Useful here because apt-Qt's 6.4.2 ceiling
        # surfaces a slow drip of Qt 6.5+-only call sites — finding them all
        # in one log beats one workflow_dispatch per fix.
        run: cmake --build build -j"$(nproc)" -- -k 0

      - name: Capture symbols
        # Extract debug info from the unstripped binaries before cpack
        # strips the packaged copies. The crash handler embeds BC_BUILD_VERSION
        # (= ${{ github.sha }}) in the crash log; the symbols-manifest.json
        # lets a triager verify they downloaded the right artifact.
        run: |
          set -euo pipefail
          mkdir -p symbols
          for exe in $(ls build/blackchirp-[0-9]* build/blackchirp-viewer-[0-9]*); do
            base=$(basename "$exe" | sed 's/-[0-9].*$//')
            objcopy --only-keep-debug "$exe" "symbols/${base}.debug"
          done
          (
            cd symbols
            jq -n \
              --arg platform "linux-deb" \
              --arg git_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              '{platform:$platform, git_sha:$git_sha, run_id:$run_id, files:[]}' \
              > symbols-manifest.json
            for f in *.debug; do
              sha=$(sha256sum "$f" | awk '{print $1}')
              jq --arg n "$f" --arg s "$sha" \
                 '.files += [{name:$n, sha256:$s}]' \
                 symbols-manifest.json > .m && mv .m symbols-manifest.json
            done
          )

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
          LD_LIBRARY_PATH: ${{ github.workspace }}/qwt-install/lib
        run: ctest --test-dir build --output-on-failure

      - name: Package
        working-directory: build
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/qwt-install/lib
        run: cpack -G DEB

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -e
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys "$GPG_KEY_ID" >/dev/null

      - name: Sign DEB (detached)
        # apt does not verify signatures embedded in .deb files (those are a
        # dpkg-sig artifact most distros never installed); the apt trust model
        # signs the repository Release file instead. For standalone GitHub-
        # release downloads, a detached `.asc` users verify manually with
        # `gpg --verify Blackchirp-*.deb.asc Blackchirp-*.deb` is the most
        # broadly-supported form.
        working-directory: build
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -e
          for f in Blackchirp-*.deb; do
            printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes \
              --pinentry-mode loopback --passphrase-fd 0 \
              --armor --detach-sign --local-user "$GPG_KEY_ID" \
              --output "${f}.asc" "$f"
            gpg --verify "${f}.asc" "$f"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            build/Blackchirp-*.deb
            symbols/*.debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-deb
          path: |
            build/Blackchirp-*.deb
            build/Blackchirp-*.deb.asc

      - name: Upload symbols
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-symbols-linux-deb
          path: symbols/
          retention-days: 90

      - name: Attach to release
        # The deb job is the first to run on a release event, so it owns the
        # one-time upload of the project's public key. --clobber means a re-run
        # is idempotent rather than failing on "asset already exists".
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            build/Blackchirp-*.deb \
            build/Blackchirp-*.deb.asc \
            packaging/blackchirp-release.asc \
            --clobber

  # ============================================================================
  # Linux .rpm (openSUSE Leap container)
  # ============================================================================
  linux-rpm:
    name: Linux RPM
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.run_linux_rpm
    container:
      image: opensuse/leap:16.0
    steps:
      - name: Install container build dependencies
        run: |
          set -eux
          zypper -n refresh
          zypper -n install -y \
            git tar gzip bzip2 curl gawk sed grep jq \
            gcc-c++ cmake ninja make pkgconf-pkg-config \
            qt6-base-devel qt6-serialport-devel qt6-tools-devel qt6-svg-devel \
            qt6-base-private-devel \
            gsl-devel eigen3-devel \
            libudev-devel \
            rpm-build gpg2

      - uses: actions/checkout@v5

      # Qwt is built from source and bundled into the RPM rather than
      # linked against the system libqwt6-qt6. openSUSE's qwt SONAME is
      # patched to libqwt-qt6.so.6.3 (minor-versioned for ABI tracking),
      # which RPM AUTOREQ records verbatim; that breaks installation on
      # Fedora/RHEL/etc. whose qwt provides only libqwt-qt6.so.6 (major).
      # Bundling sidesteps the soname-mismatch entirely — the resulting
      # RPM has no qwt dependency at all and installs cleanly on every
      # RPM distro that has Qt6.
      - name: Restore Qwt cache
        id: qwt-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          key: qwt-${{ env.QWT_VERSION }}-leap16-sysqt-v1

      - name: Build Qwt from source
        # Inside a container job, `${{ github.workspace }}` templates to
        # the runner host's path (e.g., /home/runner/work/...), which
        # does not exist on the container's bind mount; only the
        # `$GITHUB_WORKSPACE` env var (e.g., /__w/blackchirp/blackchirp)
        # resolves to the mounted workspace. Writes to the host-path
        # string land inside the container's local filesystem and are
        # invisible to the host (so the cache save step downstream
        # cannot find them). All container-side script paths therefore
        # use $GITHUB_WORKSPACE; only actions running on the host
        # (actions/cache/*) use the templated host path.
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl -L -o qwt.tar.bz2 \
            "https://sourceforge.net/projects/qwt/files/qwt/${QWT_VERSION}/qwt-${QWT_VERSION}.tar.bz2/download"
          tar xf qwt.tar.bz2
          cd "qwt-${QWT_VERSION}"
          sed -i "s|^[[:space:]]*QWT_INSTALL_PREFIX[[:space:]]*=.*|QWT_INSTALL_PREFIX = $GITHUB_WORKSPACE/qwt-install|" qwtconfig.pri
          sed -i 's|^[[:space:]]*QWT_INSTALL_HEADERS[[:space:]]*=.*|QWT_INSTALL_HEADERS = $${QWT_INSTALL_PREFIX}/include/qwt6|' qwtconfig.pri
          sed -i -E "/^[[:space:]]*QWT_CONFIG[[:space:]]*\+=[[:space:]]+Qwt(Examples|Playground|Designer|Tests|Framework)[[:space:]]*$/d" qwtconfig.pri
          qmake6 qwt.pro
          make -j"$(nproc)"
          make install

      - name: Save Qwt cache
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          key: qwt-${{ env.QWT_VERSION }}-leap16-sysqt-v1

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBC_BUNDLE_QWT=ON \
            -DQWT_ROOT="$GITHUB_WORKSPACE/qwt-install" \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/qwt-install"

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Capture symbols
        run: |
          set -euo pipefail
          mkdir -p symbols
          for exe in $(ls build/blackchirp-[0-9]* build/blackchirp-viewer-[0-9]*); do
            base=$(basename "$exe" | sed 's/-[0-9].*$//')
            objcopy --only-keep-debug "$exe" "symbols/${base}.debug"
          done
          (
            cd symbols
            jq -n \
              --arg platform "linux-rpm" \
              --arg git_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              '{platform:$platform, git_sha:$git_sha, run_id:$run_id, files:[]}' \
              > symbols-manifest.json
            for f in *.debug; do
              sha=$(sha256sum "$f" | awk '{print $1}')
              jq --arg n "$f" --arg s "$sha" \
                 '.files += [{name:$n, sha256:$s}]' \
                 symbols-manifest.json > .m && mv .m symbols-manifest.json
            done
          )

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # The test executables link against the from-source libqwt
          # under qwt-install/lib; the bundled-qwt RPATH is only set on
          # the installed binaries (the install step copies libqwt into
          # the package layout), so ctest needs the build-tree path on
          # LD_LIBRARY_PATH explicitly. Setting it via `export` inside
          # the shell (rather than the step's `env:` block) so the path
          # resolves through $GITHUB_WORKSPACE — see the "Build Qwt
          # from source" step for why the templated host path is wrong.
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/qwt-install/lib"
          ctest --test-dir build --output-on-failure

      - name: Package
        working-directory: build
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/qwt-install/lib"
          cpack -G RPM

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -e
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys "$GPG_KEY_ID" >/dev/null
          # Populate rpm's own keyring as well — `rpm --checksig` consults
          # rpm's DB, not gpg's, so without this the post-sign verification
          # reports "SIGNATURES NOT OK" even on a perfectly-good signature.
          rpm --import packaging/blackchirp-release.asc

      - name: Sign RPM (embedded)
        # `rpmsign --addsign` writes the signature into the RPM lead/header
        # so `rpm --checksig` and `zypper install` recognize it without a
        # separate file. Default %__gpg_sign_cmd would open a pinentry; the
        # loopback + --passphrase-file form below drives gpg non-interactively
        # from CI. The passphrase file is created with umask 077, used once,
        # and shredded by the EXIT trap regardless of success or failure.
        working-directory: build
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -e
          umask 077
          PASSFILE="$(mktemp)"
          trap 'shred -u "$PASSFILE" 2>/dev/null || rm -f "$PASSFILE"' EXIT
          printf '%s' "$GPG_PASSPHRASE" > "$PASSFILE"
          cat > "$HOME/.rpmmacros" <<RPMMACROS_EOF
          %_signature gpg
          %_gpg_name $GPG_KEY_ID
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor \\
              --pinentry-mode loopback --passphrase-file $PASSFILE \\
              --digest-algo sha256 -u "%{_gpg_name}" \\
              -sbo %{__signature_filename} %{__plaintext_filename}
          RPMMACROS_EOF
          for f in Blackchirp-*.rpm; do
            rpmsign --addsign "$f"
            rpm --checksig "$f"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            build/Blackchirp-*.rpm
            symbols/*.debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-rpm
          path: build/Blackchirp-*.rpm

      - name: Upload symbols
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-symbols-linux-rpm
          path: symbols/
          retention-days: 90

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh CLI may not be present in opensuse container; fall back to API
          if command -v gh >/dev/null 2>&1; then
            gh release upload "${{ github.event.release.tag_name }}" build/Blackchirp-*.rpm --clobber
          else
            zypper -n install -y gh || true
            if command -v gh >/dev/null 2>&1; then
              gh release upload "${{ github.event.release.tag_name }}" build/Blackchirp-*.rpm --clobber
            else
              for f in build/Blackchirp-*.rpm; do
                curl -fsSL -X POST \
                  -H "Authorization: token $GH_TOKEN" \
                  -H "Content-Type: application/x-rpm" \
                  --data-binary "@${f}" \
                  "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ github.event.release.id }}/assets?name=$(basename "$f")"
              done
            fi
          fi

  # ============================================================================
  # Linux AppImage
  # ============================================================================
  linux-appimage:
    name: Linux AppImage
    # Built on the oldest supported runner to cap the AppImage's effective
    # glibc floor: AppImages do not bundle glibc/libm, so symbol versions
    # picked up at link time become a hard host-glibc minimum at run time.
    # ubuntu-22.04 = glibc 2.35; building on ubuntu-latest (24.04, glibc
    # 2.39) produces AppImages that fail to load on 22.04 hosts.
    runs-on: ubuntu-22.04
    if: github.event_name == 'release' || inputs.run_linux_appimage
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libgsl-dev libeigen3-dev libudev-dev \
            file fuse libfuse2 wget desktop-file-utils

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtserialport'
          cache: true

      - name: Restore Qwt cache
        id: qwt-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          key: qwt-${{ env.QWT_VERSION }}-linux-qt${{ env.QT_VERSION }}-jammy-v3

      - name: Build Qwt from source
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl -L -o qwt.tar.bz2 \
            "https://sourceforge.net/projects/qwt/files/qwt/${QWT_VERSION}/qwt-${QWT_VERSION}.tar.bz2/download"
          tar xf qwt.tar.bz2
          cd "qwt-${QWT_VERSION}"
          sed -i "s|^[[:space:]]*QWT_INSTALL_PREFIX[[:space:]]*=.*|QWT_INSTALL_PREFIX = ${{ github.workspace }}/qwt-install|" qwtconfig.pri
          sed -i 's|^[[:space:]]*QWT_INSTALL_HEADERS[[:space:]]*=.*|QWT_INSTALL_HEADERS = $${QWT_INSTALL_PREFIX}/include/qwt6|' qwtconfig.pri
          sed -i -E "/^[[:space:]]*QWT_CONFIG[[:space:]]*\+=[[:space:]]+Qwt(Examples|Playground|Designer|Tests|Framework)[[:space:]]*$/d" qwtconfig.pri
          qmake6 qwt.pro
          make -j"$(nproc)"
          make install

      - name: Save Qwt cache
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          key: qwt-${{ env.QWT_VERSION }}-linux-qt${{ env.QT_VERSION }}-jammy-v3

      - name: Configure & build
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DQWT_ROOT="${{ github.workspace }}/qwt-install" \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/qwt-install"
          cmake --build build -j"$(nproc)"

      - name: Capture symbols
        run: |
          set -euo pipefail
          mkdir -p symbols
          for exe in $(ls build/blackchirp-[0-9]* build/blackchirp-viewer-[0-9]*); do
            base=$(basename "$exe" | sed 's/-[0-9].*$//')
            objcopy --only-keep-debug "$exe" "symbols/${base}.debug"
          done
          (
            cd symbols
            jq -n \
              --arg platform "linux-appimage" \
              --arg git_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              '{platform:$platform, git_sha:$git_sha, run_id:$run_id, files:[]}' \
              > symbols-manifest.json
            for f in *.debug; do
              sha=$(sha256sum "$f" | awk '{print $1}')
              jq --arg n "$f" --arg s "$sha" \
                 '.files += [{name:$n, sha256:$s}]' \
                 symbols-manifest.json > .m && mv .m symbols-manifest.json
            done
          )

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
          LD_LIBRARY_PATH: ${{ github.workspace }}/qwt-install/lib
        run: ctest --test-dir build --output-on-failure

      - name: Stage AppDir
        run: |
          DESTDIR="${{ github.workspace }}/AppDir" cmake --install build --component Applications
          DESTDIR="${{ github.workspace }}/AppDir" cmake --install build --component Libraries || true
          # Two AppImages ship per release: the main acquisition app and a
          # viewer-only entry point. linuxdeploy mutates the AppDir in place
          # (RPATH patches, AppRun injection, libdir cleanup) so each output
          # needs its own pristine AppDir tree to start from.
          cp -a AppDir AppDir-viewer

      - name: Fetch linuxdeploy
        run: |
          set -euxo pipefail
          mkdir -p tools
          cd tools
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-*.AppImage

      - name: Build AppImages (main and viewer)
        env:
          QML_SOURCES_PATHS: ${{ github.workspace }}/src
          # linuxdeploy resolves the binary's dependency closure via ldd, so
          # Qt and Qwt lib dirs must be on LD_LIBRARY_PATH or it reports the
          # libs as "not found" and refuses to bundle them.
          LD_LIBRARY_PATH: ${{ github.workspace }}/qwt-install/lib:${{ env.QT_ROOT_DIR }}/lib
        run: |
          set -euxo pipefail
          mkdir -p dist

          # Main AppImage — entry point: blackchirp. linuxdeploy reads the
          # desktop's Name= for the output filename; "Blackchirp" yields
          # Blackchirp-x86_64.AppImage cleanly.
          ./tools/linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --desktop-file AppDir/usr/share/applications/blackchirp.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/blackchirp.png \
            --output appimage
          mv Blackchirp-x86_64.AppImage dist/

          # Viewer AppImage — entry point: blackchirp-viewer. Without OUTPUT,
          # appimagetool would produce `Blackchirp_Viewer-x86_64.AppImage`
          # (Name=Blackchirp Viewer with the space mangled to _); pin the
          # filename explicitly so docs and signing globs stay deterministic.
          OUTPUT=Blackchirp-Viewer-x86_64.AppImage \
            ./tools/linuxdeploy-x86_64.AppImage \
              --appdir AppDir-viewer \
              --plugin qt \
              --desktop-file AppDir-viewer/usr/share/applications/blackchirp-viewer.desktop \
              --icon-file AppDir-viewer/usr/share/icons/hicolor/256x256/apps/blackchirp-viewer.png \
              --output appimage
          mv Blackchirp-Viewer-x86_64.AppImage dist/

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -e
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys "$GPG_KEY_ID" >/dev/null

      - name: Sign AppImage (detached)
        # Detached `.asc` rather than embedded: AppImage's spec defines an
        # appended-signature scheme via appimagetool's `--sign`, but typical
        # consumers (AppImageLauncher, manual download) ignore it. A side-
        # car `.asc` users verify with stock `gpg --verify` is what most
        # downstream documentation expects.
        working-directory: dist
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -e
          for f in Blackchirp*.AppImage; do
            printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes \
              --pinentry-mode loopback --passphrase-fd 0 \
              --armor --detach-sign --local-user "$GPG_KEY_ID" \
              --output "${f}.asc" "$f"
            gpg --verify "${f}.asc" "$f"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/Blackchirp*.AppImage
            symbols/*.debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-appimage
          path: |
            dist/Blackchirp*.AppImage
            dist/Blackchirp*.AppImage.asc

      - name: Upload symbols
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-symbols-linux-appimage
          path: symbols/
          retention-days: 90

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/Blackchirp*.AppImage \
            dist/Blackchirp*.AppImage.asc \
            --clobber

  # ============================================================================
  # macOS DMG / TGZ
  # ============================================================================
  macos-dmg:
    # Two macOS builds per release: Apple Silicon (arm64) and Intel
    # (x86_64). CMake does not produce universal binaries by default, so
    # the host runner's architecture dictates the output slice and CPack
    # emits Blackchirp-<version>-Darwin-{arm64,x86_64}.{dmg,tar.gz}
    # accordingly. macos-15-intel is the most recent macOS-15 Intel
    # runner GitHub publishes; macos-26-intel exists but its newer SDK
    # would silently raise the deployment-target floor and exclude the
    # Intel Macs the matrix exists to serve.
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'release' || inputs.run_macos
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-15-intel
    env:
      # Pin the binary's minimum macOS to 11.0 explicitly. Without this,
      # CMake picks up the SDK's default (whatever the runner image
      # ships) and the floor drifts upward each time GitHub bumps the
      # runner image. macOS 11 is the first version that supports
      # Apple Silicon and is the Qt 6.9 minimum on both architectures.
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          brew update
          brew install gsl eigen ninja

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtserialport'
          cache: true

      - name: Restore Qwt cache
        id: qwt-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          key: qwt-${{ env.QWT_VERSION }}-macos-${{ matrix.arch }}-qt${{ env.QT_VERSION }}-v3

      - name: Build Qwt from source
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl -L -o qwt.tar.bz2 \
            "https://sourceforge.net/projects/qwt/files/qwt/${QWT_VERSION}/qwt-${QWT_VERSION}.tar.bz2/download"
          tar xf qwt.tar.bz2
          cd "qwt-${QWT_VERSION}"
          # Use BSD sed in-place form
          sed -i '' "s|^[[:space:]]*QWT_INSTALL_PREFIX[[:space:]]*=.*|QWT_INSTALL_PREFIX = ${{ github.workspace }}/qwt-install|" qwtconfig.pri
          sed -i '' 's|^[[:space:]]*QWT_INSTALL_HEADERS[[:space:]]*=.*|QWT_INSTALL_HEADERS = $${QWT_INSTALL_PREFIX}/include/qwt6|' qwtconfig.pri
          sed -i '' -E "/^[[:space:]]*QWT_CONFIG[[:space:]]*\+=[[:space:]]+Qwt(Examples|Playground|Designer|Tests|Framework)[[:space:]]*$/d" qwtconfig.pri
          qmake qwt.pro
          make -j"$(sysctl -n hw.ncpu)"
          make install

      - name: Save Qwt cache
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          key: qwt-${{ env.QWT_VERSION }}-macos-${{ matrix.arch }}-qt${{ env.QT_VERSION }}-v3

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DQWT_ROOT="${{ github.workspace }}/qwt-install" \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/qwt-install"

      - name: Build
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Capture symbols
        run: |
          set -euo pipefail
          mkdir -p symbols
          dsymutil "build/blackchirp.app/Contents/MacOS/blackchirp-${{ env.BC_VERSION }}" \
            -o "symbols/blackchirp.dSYM"
          dsymutil "build/blackchirp-viewer.app/Contents/MacOS/blackchirp-viewer-${{ env.BC_VERSION }}" \
            -o "symbols/blackchirp-viewer.dSYM"
          (
            cd symbols
            jq -n \
              --arg platform "macos-${{ matrix.arch }}" \
              --arg git_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              '{platform:$platform, git_sha:$git_sha, run_id:$run_id, files:[]}' \
              > symbols-manifest.json
            for dsym in *.dSYM; do
              # Hash the DWARF blob inside the bundle (the load-bearing file).
              dwarf=$(find "$dsym/Contents/Resources/DWARF" -type f | head -1)
              sha=$(shasum -a 256 "$dwarf" | awk '{print $1}')
              jq --arg n "$dsym" --arg s "$sha" \
                 '.files += [{name:$n, sha256:$s}]' \
                 symbols-manifest.json > .m && mv .m symbols-manifest.json
            done
          )

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
          DYLD_FRAMEWORK_PATH: ${{ github.workspace }}/qwt-install/lib
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/qwt-install/lib
        run: ctest --test-dir build --output-on-failure

      - name: Package (DMG + TGZ)
        working-directory: build
        run: cpack -G "DragNDrop;TGZ"

      - name: Attest build provenance
        # No GPG signing here — OS-level signing on macOS is Apple
        # Developer ID + notarization, which is not configured. Attestation
        # is OS-independent and applies to the unsigned binaries. dSYM
        # bundles are directories so they're omitted from the subject-path;
        # the platform binaries are what users verify.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            build/Blackchirp-*-Darwin-${{ matrix.arch }}.dmg
            build/Blackchirp-*-Darwin-${{ matrix.arch }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-macos-${{ matrix.arch }}
          path: |
            build/Blackchirp-*-Darwin-${{ matrix.arch }}.dmg
            build/Blackchirp-*-Darwin-${{ matrix.arch }}.tar.gz

      - name: Upload symbols
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-symbols-macos-${{ matrix.arch }}
          path: symbols/
          retention-days: 90

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            build/Blackchirp-*-Darwin-${{ matrix.arch }}.dmg \
            build/Blackchirp-*-Darwin-${{ matrix.arch }}.tar.gz --clobber

  # ============================================================================
  # Windows NSIS / ZIP
  # ============================================================================
  windows-nsis:
    name: Windows NSIS
    runs-on: windows-latest
    if: github.event_name == 'release' || inputs.run_windows
    steps:
      - uses: actions/checkout@v5

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install GSL and Eigen via vcpkg
        shell: pwsh
        run: |
          vcpkg install gsl:x64-windows eigen3:x64-windows
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtserialport'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Install NSIS
        shell: pwsh
        run: choco install -y nsis

      - name: Restore Qwt cache
        id: qwt-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          key: qwt-${{ env.QWT_VERSION }}-windows-qt${{ env.QT_VERSION }}-msvc-v3

      - name: Build Qwt from source
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          curl.exe -L -o qwt.tar.bz2 "https://sourceforge.net/projects/qwt/files/qwt/$env:QWT_VERSION/qwt-$env:QWT_VERSION.tar.bz2/download"
          $size = (Get-Item qwt.tar.bz2).Length
          if ($size -lt 1MB) {
            Write-Error "Qwt download is $size bytes - likely a SourceForge HTML interstitial, not the archive"
            exit 1
          }
          tar xf qwt.tar.bz2
          cd "qwt-$env:QWT_VERSION"
          $prefix = "${{ github.workspace }}/qwt-install".Replace('\','/')
          (Get-Content qwtconfig.pri) -replace '^\s*QWT_INSTALL_PREFIX\s*=.*', "QWT_INSTALL_PREFIX = $prefix" | Set-Content qwtconfig.pri
          # PowerShell -replace runs through .NET regex substitution, where $$
          # collapses to a single literal $. To emit qmake's $${VAR} syntax
          # verbatim into qwtconfig.pri we need $$$$ here, which substitutes
          # to $$ in the output.
          (Get-Content qwtconfig.pri) -replace '^\s*QWT_INSTALL_HEADERS\s*=.*', 'QWT_INSTALL_HEADERS = $$$${QWT_INSTALL_PREFIX}/include/qwt6' | Set-Content qwtconfig.pri
          (Get-Content qwtconfig.pri) | Where-Object { $_ -notmatch '^\s*QWT_CONFIG\s*\+=\s+Qwt(Examples|Playground|Designer|Tests|Framework)\s*$' } | Set-Content qwtconfig.pri
          qmake qwt.pro
          nmake
          nmake install

      - name: Save Qwt cache
        if: steps.qwt-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/qwt-install
          key: qwt-${{ env.QWT_VERSION }}-windows-qt${{ env.QT_VERSION }}-msvc-v3

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DQWT_ROOT="${{ github.workspace }}/qwt-install" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/qwt-install"

      - name: Build
        shell: pwsh
        run: cmake --build build

      - name: Capture symbols
        shell: pwsh
        # MSVC's /Zi + /DEBUG (set in CMakeLists.txt for Release builds)
        # writes a .pdb alongside each .exe. CMake's VERSION target
        # property suffixes the executable name on Linux and the macOS
        # bundle binary, but is a no-op for Windows .exe / .pdb output —
        # so the file is just `blackchirp.pdb`, not `blackchirp-X.Y.Z.pdb`.
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path symbols -Force | Out-Null
          Copy-Item "build/blackchirp.pdb" symbols/blackchirp.pdb
          Copy-Item "build/blackchirp-viewer.pdb" symbols/blackchirp-viewer.pdb
          $files = @()
          foreach ($f in Get-ChildItem symbols/*.pdb) {
              $sha = (Get-FileHash -Algorithm SHA256 $f.FullName).Hash.ToLower()
              $files += @{ name = $f.Name; sha256 = $sha }
          }
          $manifest = [ordered]@{
              platform = 'windows-nsis'
              git_sha  = '${{ github.sha }}'
              run_id   = '${{ github.run_id }}'
              files    = $files
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content symbols/symbols-manifest.json

      - name: Test
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          $env:PATH = "${{ github.workspace }}/qwt-install/lib;$env:PATH"
          ctest --test-dir build --output-on-failure

      - name: Package (NSIS + ZIP)
        shell: pwsh
        working-directory: build
        run: cpack -G "NSIS;ZIP"

      # The `*-Windows-*` infix is what CPack injects on Windows builds
      # (Blackchirp-<version>-Windows-AMD64.{exe,zip}); the unanchored
      # `Blackchirp-*.exe` glob also matches the raw `blackchirp-viewer.exe`
      # build artifact on Windows's case-insensitive filesystem.
      - name: Attest build provenance
        # No Authenticode here — OS-level signing on Windows is Authenticode,
        # which is not configured. Attestation is OS-independent and applies
        # to the unsigned binaries.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            build/Blackchirp-*-Windows-*.exe
            build/Blackchirp-*-Windows-*.zip
            symbols/*.pdb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-windows
          path: |
            build/Blackchirp-*-Windows-*.exe
            build/Blackchirp-*-Windows-*.zip

      - name: Upload symbols
        uses: actions/upload-artifact@v4
        with:
          name: blackchirp-symbols-windows
          path: symbols/
          retention-days: 90

      - name: Attach to release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            (Get-ChildItem build/Blackchirp-*-Windows-*.exe).FullName `
            (Get-ChildItem build/Blackchirp-*-Windows-*.zip).FullName --clobber

  # ============================================================================
  # Smoke tests: install each artifact in a clean-ish environment and verify
  # the binaries launch (`--version` exits 0 with no crash). Catches missing
  # bundled libs, broken RPATHs, and packaging-step regressions before the
  # artifact reaches users. Each smoke job needs its build job to succeed.
  # ============================================================================

  linux-deb-smoke:
    name: Linux DEB smoke
    needs: linux-deb
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.run_linux_deb
    container:
      image: ubuntu:noble
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blackchirp-deb
      - name: Install package and dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          # apt resolves the .deb's Depends from the noble repos automatically.
          apt-get install -y --no-install-recommends ./Blackchirp-*.deb
      - name: Run --version
        run: |
          blackchirp --version
          blackchirp-viewer --version

  linux-rpm-smoke:
    name: Linux RPM smoke
    needs: linux-rpm
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.run_linux_rpm
    container:
      image: opensuse/tumbleweed:latest
    steps:
      # The committed public key is what end users import too; verifying
      # against it here closes the loop on the signing job — if rpmsign
      # produced a signature with the wrong key, this step fails instead
      # of the user discovering it post-release.
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: blackchirp-rpm
      - name: Verify signature and install
        run: |
          set -e
          zypper -n refresh
          rpm --import packaging/blackchirp-release.asc
          for f in Blackchirp-*.rpm; do
            rpm --checksig "$f"
            zypper -n install -y "./$f"
          done
      - name: Run --version
        run: |
          blackchirp --version
          blackchirp-viewer --version

  linux-appimage-smoke:
    name: Linux AppImage smoke
    needs: linux-appimage
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.run_linux_appimage
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blackchirp-appimage
      - name: Install AppImage runtime
        run: |
          sudo apt-get update
          # libfuse2 is the AppImage runtime requirement; without it the
          # AppImage can't self-mount and falls back to extract-and-run.
          # libopengl0 / libegl1 / libgl1 cover libglvnd's vendor-neutral
          # GL stack — linuxdeploy treats them as "core" distro libs and
          # excludes them from the bundle on the assumption that every
          # target system has them, which is not true for headless CI
          # runners. The dynamic linker fails before main() runs without
          # them, regardless of whether the invocation needs OpenGL.
          sudo apt-get install -y --no-install-recommends \
            libfuse2 libopengl0 libegl1 libgl1
      - name: Run --version
        run: |
          set -e
          # Each AppImage's AppRun forwards args to its bound entry-point
          # binary (blackchirp for the main AppImage, blackchirp-viewer for
          # the viewer AppImage). Smoke-running both confirms the second
          # linuxdeploy invocation produced an AppImage that loads its
          # bundled libraries the same way the main one does.
          for AI in Blackchirp-*.AppImage; do
            chmod +x "$AI"
            "./$AI" --version
          done

  macos-smoke:
    # One smoke job per arch, matching the macos-dmg matrix. Each runs on
    # the same runner family it was built on so the smoke catches
    # architecture-specific load failures (a binary built x86_64 on an
    # Intel runner that fails to load on an arm64 host would be a packaging
    # bug, not a CI bug).
    name: macOS smoke (${{ matrix.arch }})
    needs: macos-dmg
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'release' || inputs.run_macos
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-15-intel
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blackchirp-macos-${{ matrix.arch }}
      - name: Mount, install, and run --version
        run: |
          set -euxo pipefail
          DMG=$(ls Blackchirp-*-Darwin-${{ matrix.arch }}.dmg | head -1)
          # -nobrowse keeps the volume out of Finder; -mountpoint pins the
          # path so we don't have to scrape `hdiutil info` for it.
          # No `yes |` prefix: with CPACK_DMG_SLA_USE_RESOURCE_FILE_LICENSE
          # OFF in cmake/Packaging.cmake, hdiutil never reads stdin, so a
          # piped `yes` gets SIGPIPE on its second write and exits 1 —
          # which `set -o pipefail` then turns into a step failure even
          # though the mount itself succeeded.
          MNT=/tmp/bc-mount
          mkdir -p "$MNT"
          hdiutil attach "$DMG" -nobrowse -mountpoint "$MNT"
          cp -R "$MNT/blackchirp.app" /tmp/
          cp -R "$MNT/blackchirp-viewer.app" /tmp/
          hdiutil detach "$MNT"
          /tmp/blackchirp.app/Contents/MacOS/blackchirp --version
          /tmp/blackchirp-viewer.app/Contents/MacOS/blackchirp-viewer --version

  windows-smoke:
    name: Windows smoke
    needs: windows-nsis
    runs-on: windows-latest
    if: github.event_name == 'release' || inputs.run_windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blackchirp-windows
      - name: Silent install and run --version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = (Get-ChildItem Blackchirp-*-Windows-*.exe | Select-Object -First 1).FullName
          # NSIS: /S = silent install, /D=<path> overrides install dir and
          # MUST be the final argument. C:\Blackchirp avoids the localized
          # `C:\Program Files\Blackchirp <ver>` path so we don't have to
          # quote spaces or scrape the version from CPACK_PACKAGE_FILE_NAME.
          Start-Process -FilePath $exe -ArgumentList '/S','/D=C:\Blackchirp' -Wait
          $bin = 'C:\Blackchirp\bin\blackchirp.exe'
          $viewer = 'C:\Blackchirp\bin\blackchirp-viewer.exe'
          if (-not (Test-Path $bin))   { throw "Install did not produce $bin" }
          if (-not (Test-Path $viewer)) { throw "Install did not produce $viewer" }
          # GUI-subsystem .exe + pwsh's `&` operator is a known race —
          # pwsh doesn't reliably wait, so $LASTEXITCODE comes back null
          # even when the binary exited cleanly. Start-Process -Wait
          # blocks on the actual process, $proc.ExitCode is read from
          # the OS, and -RedirectStandardOutput captures the binary's
          # stdout to a file (which it can write because main.cpp now
          # skips AttachConsole when stdout is already a real handle).
          # On STATUS_DLL_NOT_FOUND (-1073741515), the loader prints
          # nothing to stderr — print the bin/ contents and the .exe's
          # PE imports so the missing DLL is identifiable from CI logs
          # alone, without re-running with a debugger attached.
          function Invoke-Smoke($path, $label) {
              $out = Join-Path $env:RUNNER_TEMP "$label.out"
              $err = Join-Path $env:RUNNER_TEMP "$label.err"
              $p = Start-Process -FilePath $path -ArgumentList '--version' `
                  -Wait -PassThru -NoNewWindow `
                  -RedirectStandardOutput $out -RedirectStandardError $err
              Get-Content $out, $err | Write-Host
              if ($p.ExitCode -ne 0) {
                  Write-Host "--- C:\Blackchirp\bin contents ---"
                  Get-ChildItem -Recurse C:\Blackchirp\bin | `
                      Select-Object FullName, Length | Format-Table -AutoSize
                  $dumpbin = Get-Command dumpbin.exe -ErrorAction SilentlyContinue
                  if ($dumpbin) {
                      Write-Host "--- $label PE dependents ---"
                      & $dumpbin.Source /dependents $path 2>&1 | Write-Host
                  }
                  throw "$label --version exited $($p.ExitCode)"
              }
          }
          Invoke-Smoke $bin    'blackchirp'
          Invoke-Smoke $viewer 'blackchirp-viewer'
